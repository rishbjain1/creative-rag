name: ci

on:
  push:
    branches: [main, "feat/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .[dev]
      - name: Tests
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build only — proves the image assembles (models download + sample
      # index bakes). Push to ECR happens from deploy/apply.sh with real creds.
      - name: Docker build
        run: docker build -t creative-rag:ci .

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: deploy
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: terraform fmt
        run: terraform fmt -check
      - name: terraform validate
        run: |
          terraform init -backend=false -input=false
          terraform validate
