name: eval

# Regression gate: unit tests + an offline retrieval eval on a committed sample
# corpus (no secrets, no LLM). The real-corpus eval runs locally (see eval/README.md);
# here we guard that retrieval quality on the sample set never silently regresses.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Unit tests (chunking, fusion, metrics — offline)
        run: pytest tests/ -q

      - name: Build sample index
        env:
          CRAG_CORPUS_ROOT: ${{ github.workspace }}/eval/sample_corpus
          CRAG_INDEX_DIR: ${{ github.workspace }}/eval/.sample_index
        run: crag ingest

      - name: Retrieval eval + gate (sample corpus)
        env:
          CRAG_INDEX_DIR: ${{ github.workspace }}/eval/.sample_index
        run: |
          crag-eval --qa eval/qa_sample.jsonl --gate \
            --out eval/metrics_sample.json \
            --min-hit 1.0 --min-mrr 0.9 --min-ndcg 0.9

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-metrics
          path: eval/metrics_sample.json
